version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      - SESSION_CLEANUP_INTERVAL_SECONDS=${SESSION_CLEANUP_INTERVAL_SECONDS:-300}
      - SESSION_TTL_MINUTES=${SESSION_TTL_MINUTES:-30}
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insightflow_frontend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - MODELING_API_URL=http://backend:8000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - E2E_AUTH_BYPASS=${E2E_AUTH_BYPASS:-1}
      - AI_API_KEY=${AI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_API_ENDPOINT=${AI_API_ENDPOINT:-https://api.openai.com/v1/chat/completions}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
    depends_on:
      - backend
    restart: always
